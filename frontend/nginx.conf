server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass https://dev-productivity-platform-backend.onrender.com/api/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name dev-productivity-platform-backend.onrender.com;
        proxy_set_header Host dev-productivity-platform-backend.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
