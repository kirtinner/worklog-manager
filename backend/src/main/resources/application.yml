spring:
  application:
    name: dev-productivity-platform

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/dev_platform}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-my-super-secret-key}

logging:
  level:
    org.springframework.dao: DEBUG
    org.hibernate.engine.jdbc.spi.SqlExceptionHelper: DEBUG
    org.springframework.web: INFO

app:
  about:
    application-name: Dev Productivity Platform
    version: 1.0.0
    author: Kiryl Zhastkou
    license: MIT
    repository: https://github.com/kirtinner/worklog-manager
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  full-data-export:
    scheduled:
      enabled: false
      cron: "0 0 2 * * *"
      export-dir: ""
      retention-days: 30
